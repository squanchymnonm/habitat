<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hábitat de sesiones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16121E; --bg2:#1E1830; --surface:#241D38; --surface2:#2C2342;
    --line:#100c1a; --soft:#3A2F55; --ink:#ECE6F5; --dim:#9D93B8;
    --gold:#F4B740; --teal:#46D6C8; --coral:#FF6B7A; --green:#8BD17C; --red:#FF5C5C; --lav:#7C7699;
    --f-logo:'Press Start 2P', monospace;
    --f-ui:'Silkscreen','Press Start 2P', monospace;
    --f-body:'VT323', ui-monospace, monospace;
    --bevel: inset 2px 2px 0 rgba(255,255,255,.07), inset -2px -2px 0 rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--f-body); color:var(--ink); font-size:17px;
    background:
      radial-gradient(1100px 650px at 80% -10%, #2A2142 0%, transparent 60%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    background-attachment:fixed; min-height:100%; image-rendering:pixelated;
  }
  /* CRT scanlines */
  body::after{content:""; position:fixed; inset:0; pointer-events:none; z-index:60;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,.16) 0 1px, transparent 1px 3px); opacity:.6}

  header{display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:20px clamp(16px,4vw,40px); border-bottom:3px solid var(--line);
    position:sticky; top:0; z-index:5; background:#1a1428}
  .brand{display:flex; align-items:center; gap:12px}
  .brand b{font-family:var(--f-logo); font-size:13px; letter-spacing:0; color:var(--ink)}
  .brand .dot{color:var(--gold)}
  .brand small{color:var(--dim); font-family:var(--f-ui); font-size:9px; letter-spacing:.5px}
  .demo-badge{font-family:var(--f-ui); font-size:9px; letter-spacing:1px; color:#15101C; background:var(--gold); padding:5px 7px; box-shadow:var(--bevel)}
  .count{margin-left:auto; display:flex; gap:18px; align-items:center; font-family:var(--f-ui); font-size:11px; color:var(--dim)}
  .count b{color:var(--ink)} .count .need{color:var(--coral)}
  .controls{display:flex; gap:10px; flex-wrap:wrap}
  button.ctl{font-family:var(--f-ui); font-size:9px; text-transform:uppercase; letter-spacing:.5px;
    background:var(--surface2); color:var(--ink); border:2px solid var(--line); border-radius:0;
    padding:9px 11px; cursor:pointer; box-shadow:inset 1px 1px 0 rgba(255,255,255,.08), 3px 3px 0 #0c0913}
  button.ctl:hover{background:var(--gold); color:#15101C; transform:translate(-1px,-1px); box-shadow:inset 1px 1px 0 rgba(255,255,255,.25), 4px 4px 0 #0c0913}
  button.ctl:active{transform:translate(2px,2px); box-shadow:none}
  button.ctl:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

  main{padding:clamp(18px,3.5vw,38px)}
  .grid{display:grid; gap:20px; grid-template-columns:repeat(auto-fill, minmax(236px,1fr)); max-width:1280px; margin:0 auto}

  .pod{position:relative; border:2px solid var(--line); border-radius:0; background:var(--surface);
    padding:16px 14px 14px; cursor:pointer; overflow:hidden;
    box-shadow:var(--bevel), 4px 4px 0 #0c0913; transition:transform .1s, border-color .1s}
  .pod:hover{transform:translate(-2px,-2px); border-color:var(--gold); box-shadow:var(--bevel), 6px 6px 0 #0c0913}
  .pod:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .pod .ring{position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 0 2px transparent}
  .pod.working .ring{box-shadow:inset 0 0 0 3px var(--teal)}
  .pod.done .ring{box-shadow:inset 0 0 0 3px var(--green)}
  .pod.error .ring{box-shadow:inset 0 0 0 3px var(--red)}
  .pod.waiting{border-color:var(--coral)}
  .pod.waiting .ring{box-shadow:inset 0 0 0 3px var(--coral), inset 0 0 0 6px rgba(255,107,122,.22); animation:needblink .7s steps(1) infinite}
  @keyframes needblink{0%,50%{opacity:1}50.01%,100%{opacity:.3}}
  .pod.offline{opacity:.5; filter:saturate(.4)}

  /* ===== ARENA DE COMBATE (en el pod) ===== */
  .stage{height:120px; position:relative; overflow:hidden; background:linear-gradient(180deg,#1c1630,#15101f); border:2px solid var(--line); box-shadow:var(--bevel)}
  .gfloor{position:absolute; left:6px; right:6px; bottom:26px; height:2px; background:rgba(255,255,255,.07)}
  .fighter{image-rendering:pixelated; background-repeat:no-repeat; position:absolute; bottom:20px}
  .phero{height:60px; left:9%}
  .pmon{height:60px; right:9%}
  .pmon.boss{height:88px; right:5%}
  .pmon.hit{filter:brightness(3) saturate(0)}
  .pmon.dying{animation:bdie .5s steps(5) forwards}
  .phero.flinch{animation:bflinch .3s steps(2) 2}
  .pcount{position:absolute; top:5px; left:8px; font-family:var(--f-ui); font-size:8px; color:var(--gold); letter-spacing:.3px}
  .pmonname{position:absolute; bottom:4px; left:0; right:0; text-align:center; font-family:var(--f-body); font-size:13px;
    color:#cdbfe6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px}
  .pdmg{position:absolute; font-family:var(--f-ui); font-size:12px; color:var(--gold); text-shadow:2px 2px 0 #000;
    pointer-events:none; animation:bdmgfloat .85s ease-out forwards; white-space:nowrap}
  .pdmg.big{font-size:16px; color:#fff}
  .pod.offline .stage{filter:grayscale(1) brightness(.85)}
  .ploot{position:absolute; inset:0; background:rgba(10,7,16,.88); display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:3px; text-align:center; padding:10px}
  .ploot.show{display:flex; animation:bfadein .2s}
  .ploot .ttl{font-family:var(--f-ui); font-size:10px; color:var(--gold)}
  .ploot .mn{font-family:var(--f-body); font-size:16px; color:#fff}
  .ploot .stat{font-family:var(--f-body); font-size:13px; color:#cdbfe6} .ploot .stat b{color:var(--coral)}
  .ploot .lootline{font-family:var(--f-body); font-size:12px; color:var(--green)} .ploot .lootline span{color:var(--dim)}

  .pstam{height:12px; border:2px solid var(--line); background:#120E1B; box-shadow:var(--bevel); margin-top:8px; position:relative; overflow:hidden}
  .pstam > i{display:block; height:100%; width:100%; background:var(--green); transition:width .4s steps(8)}
  .pstam .lbl{position:absolute; right:5px; top:0; font-family:var(--f-ui); font-size:7px; color:#fff; mix-blend-mode:difference}

  .bubble{position:absolute; top:6px; right:8px; background:var(--coral); color:#2a0d12;
    font-family:var(--f-ui); font-size:11px; padding:5px 7px; display:none; align-items:center; justify-content:center;
    border:2px solid var(--line); box-shadow:2px 2px 0 #0c0913; animation:blinkb .5s steps(1) infinite; z-index:3}
  .pod.waiting .bubble{display:flex}
  @keyframes blinkb{0%,60%{opacity:1}60.01%,100%{opacity:.4}}
  .badge{position:absolute; top:8px; right:10px; font-family:var(--f-ui); font-size:13px; display:none; z-index:3}
  .pod.done .badge.ok{display:block; color:var(--green)} .pod.error .badge.err{display:block; color:var(--red)}

  .meta{margin-top:4px}
  .name{font-family:var(--f-ui); font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .chip{font-family:var(--f-ui); font-size:8px; letter-spacing:.4px; text-transform:uppercase; padding:4px 6px; border:1px solid var(--line)}
  .chip.idle{background:#332c4d; color:#c3bcd9}
  .chip.working{background:#123733; color:var(--teal)}
  .chip.waiting{background:#3a1620; color:var(--coral)}
  .chip.done{background:#173318; color:var(--green)}
  .chip.error{background:#3a1414; color:var(--red)}
  .chip.offline{background:#2c2740; color:var(--dim)}
  .repo{font-family:var(--f-body); font-size:15px; color:var(--dim); margin-top:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .repo .br{color:var(--gold)}
  .action{font-family:var(--f-body); font-size:16px; color:#cfc7e2; margin-top:6px; min-height:32px; line-height:1.15}
  .pod.waiting .action{color:#ffd0d6}
  .since{font-family:var(--f-ui); font-size:8px; color:#6f6890; margin-top:8px; letter-spacing:.3px}
  .empty{grid-column:1/-1; text-align:center; color:var(--dim); border:2px dashed var(--soft); padding:48px 20px; font-family:var(--f-body); font-size:18px}
  .empty code{color:var(--gold)}
  footer{max-width:1280px; margin:8px auto 0; padding:0 clamp(18px,3.5vw,38px) 30px; color:#5f5980; font-family:var(--f-ui); font-size:8px; letter-spacing:.3px}

  .scrim{position:fixed; inset:0; background:rgba(8,6,12,.6); opacity:0; pointer-events:none; transition:.15s; z-index:20}
  .scrim.open{opacity:1; pointer-events:auto}
  .drawer{position:fixed; top:0; right:0; height:100%; width:min(440px,94vw); background:#1a1428; border-left:3px solid var(--line);
    transform:translateX(100%); transition:transform .2s steps(6); z-index:21; display:flex; flex-direction:column; padding:22px}
  .drawer.open{transform:none}
  .dhead{display:flex; gap:16px; align-items:flex-start}
  .face{width:112px; height:112px; image-rendering:pixelated; border:3px solid var(--line); border-radius:0;
    box-shadow:var(--bevel); background:#120E1B; flex:0 0 auto}
  .dinfo{flex:1; min-width:0}
  .dname{font-family:var(--f-ui); font-size:15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:4px}
  .closex{background:none; border:0; color:var(--dim); font-family:var(--f-ui); font-size:18px; cursor:pointer; line-height:1}
  .term{margin-top:18px; background:#120E1B; border:2px solid var(--line); box-shadow:var(--bevel);
    font-family:var(--f-body); font-size:16px; padding:14px; flex:1; overflow:auto; color:#b7aed0; white-space:pre-wrap; line-height:1.25}
  .term .g{color:var(--green)} .term .t{color:var(--teal)} .term .y{color:var(--gold)} .term .d{color:#6f6890}
  .chat{display:flex; gap:10px; margin-top:14px}
  .chat input{flex:1; background:var(--surface2); border:2px solid var(--line); color:var(--ink); border-radius:0; padding:10px 12px; font-family:var(--f-body); font-size:17px; box-shadow:var(--bevel)}
  .chat input::placeholder{color:#6f6890}
  .chat button{background:var(--gold); color:#15101C; border:2px solid var(--line); border-radius:0; padding:0 14px; font-family:var(--f-ui); font-size:9px; text-transform:uppercase; cursor:not-allowed; opacity:.6}
  .dmeta{margin-top:18px; flex:1}
  .dmeta .action{font-family:var(--f-body); font-size:18px; color:#cfc7e2; line-height:1.3}
  .dmeta .since{font-family:var(--f-ui); font-size:8px; color:#6f6890; margin-top:12px; letter-spacing:.3px}
  .phase2{margin-top:12px; font-family:var(--f-body); font-size:15px; color:var(--dim); text-align:center}
  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important}}

  /* ===== BATTLE STAGE (drawer) ===== */
  .hpwrap{margin-top:14px; font-family:var(--f-ui); font-size:8px; color:var(--dim); letter-spacing:.5px}
  .hpbar{height:14px; border:2px solid var(--line); background:#120E1B; box-shadow:var(--bevel); margin-top:4px; position:relative; overflow:hidden}
  .hpfill{height:100%; width:100%; background:var(--green); transition:width .4s steps(8)}
  .hpval{position:absolute; right:5px; top:1px; font-size:8px; color:#fff; mix-blend-mode:difference}
  .bstage{position:relative; height:180px; margin-top:12px; border:2px solid var(--line); background:linear-gradient(180deg,#1c1630,#15101f); box-shadow:var(--bevel); overflow:hidden}
  .bground{position:absolute; left:0; right:0; bottom:34px; height:2px; background:rgba(255,255,255,.06)}
  .bground::after{content:"";position:absolute;left:0;right:0;top:2px;height:32px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 6px,transparent 6px 12px)}
  .bfighter{image-rendering:pixelated; background-repeat:no-repeat; position:absolute; bottom:28px}
  /* tamaño/animación de sprites los fija animateSprite() por JS (frames reales del PNG) */
  .bhero{height:80px;left:8%;transition:transform .12s steps(2)}
  .bmon{height:80px;right:8%}
  .bmon.boss{height:120px;right:4%}
  .bmon.hit{filter:brightness(3) saturate(0)}
  .bmon.dying{animation:bdie .5s steps(5) forwards}
  @keyframes bidle{0%,49%{background-position:0 0}50%,100%{background-position:-80px 0}}
  @keyframes bidle2b{0%,49%{background-position:0 0}50%,100%{background-position:-120px 0}}
  @keyframes bdie{to{opacity:0; transform:translateY(8px) scale(.7)}}
  .bdmg{position:absolute; font-family:var(--f-ui); font-size:13px; color:var(--gold); text-shadow:2px 2px 0 #000; pointer-events:none; animation:bdmgfloat .85s ease-out forwards; white-space:nowrap}
  .bdmg.big{font-size:17px; color:#fff}
  @keyframes bdmgfloat{0%{opacity:0;transform:translateY(0) scale(.5)}18%{opacity:1;transform:translateY(-8px) scale(1)}100%{opacity:0;transform:translateY(-46px)}}
  .bmonname{position:absolute; bottom:6px; right:8%; max-width:55%; text-align:center; font-family:var(--f-body); font-size:14px; color:#cdbfe6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bhero.flinch{animation:bflinch .3s steps(2) 2}
  @keyframes bflinch{0%,100%{transform:translateX(0);filter:none}50%{transform:translateX(-8px);filter:brightness(2) sepia(1) hue-rotate(-30deg)}}
  .bbubble{position:absolute; top:12px; left:calc(8% + 84px); background:var(--coral); color:#2a0d12; font-family:var(--f-ui); font-size:10px; padding:6px 8px; border:2px solid var(--line); box-shadow:2px 2px 0 #0c0913; display:none}
  .bstage.needs .bbubble{display:block}
  .bstage.needs .bmon{opacity:.4}
  .bloot{position:absolute; inset:0; background:rgba(10,7,16,.86); display:none; flex-direction:column; align-items:center; justify-content:center; gap:6px; text-align:center; padding:14px}
  .bloot.show{display:flex; animation:bfadein .2s}
  @keyframes bfadein{from{opacity:0}to{opacity:1}}
  .bloot .ttl{font-family:var(--f-ui); font-size:11px; color:var(--gold)}
  .bloot .mn{font-family:var(--f-body); font-size:17px; color:#fff}
  .bloot .stat{font-family:var(--f-body); font-size:15px; color:#cdbfe6}
  .bloot .stat b{color:var(--coral)}
  .bloot .lootline{font-family:var(--f-body); font-size:14px; color:var(--green); margin-top:2px}
  .bloot .lootline span{color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="brand"><b>EL MONO<span class="dot">.</span></b><small>HÁBITAT · SERVER</small></div>
  <span class="demo-badge">DEMO</span>
  <div class="count"><span><b id="c-total">0</b> SESIONES</span><span class="need"><b id="c-need">0</b> TE NECESITAN</span></div>
  <div class="controls">
    <button class="ctl" id="b-add">+ sesión</button>
    <button class="ctl" id="b-cycle">cambiar estado</button>
    <button class="ctl" id="b-need">te necesita</button>
  </div>
</header>
<main><div class="grid" id="grid"></div></main>
<footer>SPRITES: NINJA ADVENTURE — PIXEL-BOY / AAA — CC0</footer>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>

<script>
// Personajes disponibles en assets/char/ (ver habitat/scripts/import-assets.sh)
const SPRITE_ORDER=["Boy","Cavegirl","Knight","NinjaBlue","Monk","Hunter","FighterRed","DemonRed","Eskimo","GreenPig","Lion","Monkey","Inspector","Master","KnightGold","Caveman"];

/* ====== CAPA MOCK — se reemplaza por el WebSocket real del backend ======
   Contrato de sesión (lo manda el server vía hooks de Claude Code):
     { id, name, project, branch, status, action, since }
     status ∈ idle | working | waiting | done | error | offline
   Cada sesión recibe un personaje estable: hash(name) % SPRITE_ORDER.length
   ======================================================================= */
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return Math.abs(h)}
function pickKey(name){return SPRITE_ORDER[hash('spr'+name)%SPRITE_ORDER.length]}
// status -> [archivo de animación, clase de frames]. idle/jump = strips de 4 frames; item/dead = 1 frame.
const SPR_ANIM={idle:['idle','f4'],working:['idle','f4'],waiting:['jump','f4'],done:['item','f1'],error:['dead','f1'],offline:['idle','f4']};
function sprData(s){const c=pickKey(s.name);const a=SPR_ANIM[s.status]||SPR_ANIM.idle;return ['assets/char/'+c+'/'+a[0]+'.png',a[1]]}
function faceFor(name){return 'assets/char/'+pickKey(name)+'/face.png'}

const STATUS_LABEL={idle:'quieta',working:'trabajando',waiting:'te necesita',done:'lista',error:'error',offline:'caída'};
const ACTIONS={
  idle:['en espera','sin tarea activa','lista para arrancar'],
  working:['corriendo los tests','editando UserController.php','refactorizando auth','clonando el repo','armando el plan'],
  waiting:['¿pusheo a main o abro PR?','necesito tu OK para borrar la tabla','¿qué nombre le pongo al endpoint?','elegí una opción'],
  done:['terminó: PR #42 abierto','listo, branch pusheado','tarea completada'],
  error:['falló el build','tests en rojo','no pudo clonar el repo'],
  offline:['sesión cerrada','tmux caído']
};
function pick(a,seed){return a[hash(''+seed)%a.length]}
// Payloads de hook = entrada no confiable (Ley 1): escapar antes de innerHTML.
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

let SESSIONS = [];
const params = new URLSearchParams(location.search);
const DEMO = params.has('demo');
const WS_TOKEN = params.get('token') || '';

function upsertSession(s) {
  const i = SESSIONS.findIndex((x) => x.id === s.id);
  if (i === -1) SESSIONS.push(s); else SESSIONS[i] = s;
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${location.host}/${WS_TOKEN ? '?token=' + encodeURIComponent(WS_TOKEN) : ''}`;
  const ws = new WebSocket(url);
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'snapshot') { SESSIONS = msg.sessions; render(); }
    else if (msg.type === 'session') { upsertSession(msg.session); render(); }
    else if (msg.type === 'remove') { SESSIONS = SESSIONS.filter((s) => s.id !== msg.id); render(); }
    else if (msg.type === 'fightResult') handleFightResult(msg);
  };
  ws.onclose = () => setTimeout(connectWS, 1500); // reconexión
}

function ago(ts){const m=Math.round((Date.now()-ts)/60000); if(m<1)return'recién'; if(m<60)return m+'m'; return Math.floor(m/60)+'h '+(m%60)+'m'}

const grid=document.getElementById('grid');
const pods=new Map();          // id -> elemento del pod (se actualiza in-place, no se reconstruye)
const lastTokensSeen={};
function byId(id){return SESSIONS.find(s=>s.id===id)}

function render(){
  document.getElementById('c-total').textContent=SESSIONS.length;
  document.getElementById('c-need').textContent=SESSIONS.filter(s=>s.status==='waiting').length;
  if(!SESSIONS.length){grid.innerHTML='<div class="empty">No hay sesiones abiertas.<br>Arrancá una con <code>mono &lt;proyecto&gt;</code> en el server.</div>';pods.clear();return}
  if(grid.querySelector('.empty')) grid.innerHTML='';
  const ids=new Set(SESSIONS.map(s=>s.id));
  for(const [id,el] of pods){ if(!ids.has(id)){ el.remove(); pods.delete(id); delete lastTokensSeen[id]; } }
  SESSIONS.forEach(s=>{
    let el=pods.get(s.id);
    if(!el){ el=buildPod(s); pods.set(s.id,el); grid.appendChild(el); }
    paintPod(el,s);
  });
}

function buildPod(s){
  const pod=document.createElement('div');
  pod.tabIndex=0; pod.setAttribute('role','button'); pod.dataset.id=s.id;
  pod.innerHTML=`
    <div class="ring"></div>
    <div class="badge ok">✓</div><div class="badge err">!</div>
    <div class="stage">
      <div class="pcount"></div>
      <div class="bubble"></div>
      <div class="gfloor"></div>
      <div class="fighter phero"></div>
      <div class="fighter pmon"></div>
      <div class="pmonname"></div>
      <div class="ploot"></div>
    </div>
    <div class="pstam"><i></i><span class="lbl"></span></div>
    <div class="meta">
      <div class="name"></div><div class="repo"></div><div class="action"></div><div class="since"></div>
    </div>`;
  const open=()=>{const cur=byId(s.id); if(cur) openDrawer(cur);};
  pod.addEventListener('click',open);
  pod.addEventListener('keydown',e=>{if(e.key==='Enter')open();});
  return pod;
}

// Actualiza un pod existente sin reconstruirlo (preserva animaciones de sprites).
function paintPod(pod,s){
  pod.className='pod '+s.status;
  pod.querySelector('.name').innerHTML=esc(s.name)+' <span class="chip '+s.status+'">'+STATUS_LABEL[s.status]+'</span>';
  pod.querySelector('.repo').innerHTML=esc(s.project)+' <span class="br">⌥ '+esc(s.branch)+'</span>';
  pod.querySelector('.action').textContent=s.action||'';
  pod.querySelector('.since').textContent='ACTIVA HACE '+ago(s.since);
  pod.querySelector('.bubble').textContent = s.status==='waiting' ? '¡te necesita!' : '';
  // héroe: mira a la derecha (frame 3) si pelea; de frente (frame 0) si no hay monstruo
  const hero=pod.querySelector('.phero'), hdir=s.monster?3:0, hkey=pickKey(s.name)+'/'+hdir;
  if(hero.dataset.k!==hkey){ hero.dataset.k=hkey; showFrame(hero,'assets/char/'+pickKey(s.name)+'/idle.png',hdir); }
  // monstruo (mirando a la izquierda = fila 2) o boss (strip de frente)
  const mon=pod.querySelector('.pmon'), nameEl=pod.querySelector('.pmonname');
  if(s.monster){
    mon.style.display='';
    mon.classList.toggle('boss',!!s.monster.isBoss);
    nameEl.textContent=s.monster.label+(s.monster.isBoss?'  (BOSS)':'');
    const url=s.monster.isBoss?bossSprite(s.monster.label):monsterSprite(s.monster.type);
    if(mon.dataset.url!==url){ mon.dataset.url=url;
      if(s.monster.isBoss) animateSprite(mon,url,false,1000);
      else animateSprite(mon,url,true,900,2); }
  } else { mon.style.display='none'; mon.dataset.url=''; nameEl.textContent=''; }
  const q=s.quest;
  pod.querySelector('.pcount').textContent = q&&q.total ? (q.done+(s.monster?1:0))+'/'+q.total : '';
  // stamina (= context)
  const stam=Math.max(0,Math.min(100,s.stamina==null?100:s.stamina));
  const fill=pod.querySelector('.pstam > i'); fill.style.width=stam+'%';
  fill.style.background=stam>50?'var(--green)':stam>20?'var(--gold)':'var(--red)';
  pod.querySelector('.pstam .lbl').textContent='STAMINA '+stam+'%';
  // daño flotante = subió combat.tokens
  const tok=(s.combat&&s.combat.tokens)||0;
  if(lastTokensSeen[s.id]!==undefined && tok>lastTokensSeen[s.id] && s.combat&&s.combat.lastDamage)
    floatDamage(pod,s.combat.lastDamage,s.monster&&s.monster.isBoss);
  lastTokensSeen[s.id]=tok;
  if(s.status==='error') flinchHero(pod);
}

function floatDamage(pod,n,big){
  const stage=pod.querySelector('.stage'), mon=pod.querySelector('.pmon'); if(!mon) return;
  const d=document.createElement('div'); d.className='pdmg'+(big?' big':''); d.textContent='-'+fmt(n);
  const sr=stage.getBoundingClientRect(), mr=mon.getBoundingClientRect();
  d.style.left=(mr.left-sr.left+6)+'px'; d.style.top=(mr.top-sr.top+2)+'px';
  stage.appendChild(d); setTimeout(()=>d.remove(),850);
  mon.classList.add('hit'); setTimeout(()=>mon.classList.remove('hit'),110);
}
function flinchHero(pod){const h=pod.querySelector('.phero'); if(!h)return; h.classList.add('flinch'); setTimeout(()=>h.classList.remove('flinch'),700);}
function handleFightResult(msg){
  const pod=pods.get(msg.id); if(!pod) return;
  const mon=pod.querySelector('.pmon'), loot=pod.querySelector('.ploot'); const r=msg.result;
  if(mon) mon.classList.add('dying');
  loot.innerHTML='<div class="ttl">★ VENCIDO ★</div><div class="mn">'+esc(r.monster)+'</div>'+
    '<div class="stat">HP <b>'+fmt(r.hp)+'</b> · '+Number(r.hits||0)+' golpes</div>'+
    '<div class="lootline">LOOT: <span>'+(r.loot||[]).map(esc).join(', ')+'</span></div>';
  loot.classList.add('show');
  setTimeout(()=>{loot.classList.remove('show'); if(mon) mon.classList.remove('dying');},2600);
}

// ===== Capa de batalla (assets reales) =====
const MONSTERS=["Slime","Slime3","Flam","BlueBat","Mushroom","KappaGreen","Eye","Larva","Mole","Mouse","Lizard","Bear","Beast","GreenOctopus","Butterfly","Dragon"];
const BOSSES=["GiantFrog","DemonCyclop","GiantBamboo","TenguRed","GiantRacoon","GiantSpirit","GiantFlam","TenguBlue"];
function monsterSprite(type){return 'assets/monster/'+MONSTERS[hash('mon'+type)%MONSTERS.length]+'.png'}
function bossSprite(label){return 'assets/boss/'+BOSSES[hash('boss'+label)%BOSSES.length]+'.png'}
function fmt(n){return (n||0).toLocaleString('es-AR')}

// Anima un spritesheet calculando los frames desde las dims reales del PNG.
// grid=true: hoja 4x4 (monstruo), anima la fila `row` (0=abajo,1=arriba,2=izq,3=der).
// Si no (boss): strip horizontal, frames = ancho/alto.
function animateSprite(el, url, grid, dur, row){
  el.style.backgroundImage='url('+url+')';
  const r = row||0;
  const img=new Image();
  img.onload=()=>{
    const nW=img.naturalWidth, nH=img.naturalHeight;
    const frameH = grid ? nH/4 : nH;
    const frames = grid ? 4 : Math.max(1, Math.round(nW/nH));
    const scale = el.clientHeight / frameH;        // frameH*scale = clientHeight
    const dispFrameW = (grid ? nW/4 : frameH) * scale;
    el.style.width = dispFrameW+'px';
    el.style.backgroundSize = (nW*scale)+'px '+(nH*scale)+'px';
    el.style.backgroundPositionY = (-(r*el.clientHeight))+'px';   // fila (dirección)
    if (el._anim) el._anim.cancel();
    if (frames>1) el._anim = el.animate(
      [{backgroundPositionX:'0px'},{backgroundPositionX:-(dispFrameW*frames)+'px'}],
      {duration: dur||900, iterations: Infinity, easing:'steps('+frames+')'});
  };
  img.src=url;
}

// Muestra UN frame estático de un strip (para sprites direccionales como Idle.png).
function showFrame(el, url, idx){
  el.style.backgroundImage='url('+url+')';
  const img=new Image();
  img.onload=()=>{
    const nW=img.naturalWidth, nH=img.naturalHeight;
    const frames=Math.max(1, Math.round(nW/nH));
    const scale=el.clientHeight/nH;
    const fw=nH*scale;
    if(el._anim){el._anim.cancel(); el._anim=null;}
    el.style.width=fw+'px';
    el.style.backgroundSize=(nW*scale)+'px '+(nH*scale)+'px';
    el.style.backgroundPositionY='0px';
    el.style.backgroundPositionX=(-Math.min(idx,frames-1)*fw)+'px';
  };
  img.src=url;
}

// ===== Drawer (detalle) = avatar + metadata + chat (fase 2) =====
const scrim=document.getElementById('scrim'), drawer=document.getElementById('drawer');
function openDrawer(s){
  drawer.innerHTML=`
    <div class="dhead">
      <img class="face" src="${faceFor(s.name)}" alt="">
      <div class="dinfo"><div class="dname">${esc(s.name)} <span class="chip ${s.status}">${STATUS_LABEL[s.status]}</span></div>
        <div class="repo">${esc(s.project)} <span class="br">⌥ ${esc(s.branch)}</span></div></div>
      <button class="closex" aria-label="cerrar">×</button>
    </div>
    <div class="dmeta">
      <div class="action">${esc(s.action)}</div>
      <div class="since">ACTIVA HACE ${ago(s.since)}</div>
    </div>
    <div class="chat"><input placeholder="Escribir a ${esc(s.name)}… (fase 2)" disabled><button disabled>Enviar</button></div>
    <div class="phase2">El chat directo llega en la fase 2.<br>Por ahora respondé desde Remote Control en el celu.</div>`;
  drawer.querySelector('.closex').addEventListener('click',closeDrawer);
  drawer.classList.add('open'); scrim.classList.add('open'); drawer.setAttribute('aria-hidden','false');
}
function closeDrawer(){drawer.classList.remove('open');scrim.classList.remove('open');drawer.setAttribute('aria-hidden','true')}
scrim.addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
